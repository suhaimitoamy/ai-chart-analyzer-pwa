<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F111A" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <title>Amy FX Analyzer</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" async defer></script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => {
            console.log('SW registration failed: ', err);
          });
        });
      }

      // GLOBAL AMY FX HAPTIC
      window.triggerHaptic = function(pattern) {
        if (window.Android && window.Android.triggerHaptic) {
          window.Android.triggerHaptic(pattern || 20);
        } else if ('vibrate' in navigator) {
          navigator.vibrate(pattern || 20);
        }
      };
      document.addEventListener('click', function(e) {
        let btn = e.target.closest('button, a, .card, .nav-btn, .action-btn, .clickable');
        if (btn) window.triggerHaptic(20);
      });
    </script>
  </body>
</html>
